<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Notebook Not Found</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <div id="sidebar">
      <div class="sidebar-header">
        <h2>variability.dev</h2>
        <h4>Notebooks</h4>
        <button id="sidebar-toggle" class="sidebar-toggle-button">&#9776;</button>
      </div>
      <div id="notebook-list"></div>
    </div>
    <div id="main-content">
      <div id="notebook-display-area">
        <div id="content">
          <div class="error-page" style="text-align: center; padding: 50px;">
            <h1>404 Not Found</h1>
            <p>The notebook you are looking for does not exist.</p>
            <p>Please select a notebook from the sidebar or go to the <a href="index.md">Welcome! Notebook</a>.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>
  <script type="module">
    import { BASE_URL } from './js/config.js';
    import { Sidebar } from './js/sidebar.js';

    // Update the home link with the base URL
    document.getElementById('home-link').href = `${BASE_URL}index.md`;

    // Initialize the sidebar
    const sidebar = new Sidebar();
    sidebar.loadNotebooks();

    // Handle sidebar toggle
    const sidebarToggleButton = document.getElementById('sidebar-toggle');
    const container = document.querySelector('.container');

    if (sidebarToggleButton && container) {
      sidebarToggleButton.addEventListener('click', () => {
        container.classList.toggle('collapsed');
      });
    }
  </script>
</body>
</html>
