<!DOCTYPE html>
<html>
<head>
    <script>
        // Get the original path and redirect to index.html with it
        const originalPath = window.location.pathname;
        window.location.href = '/index.html?path=' + encodeURIComponent(originalPath);
    </script>
    <title>Redirecting...</title>
</head>
<body>
    <p>Redirecting ...</p>
</body>
</html>
